name: Update README.md

on:
  schedule:
    # GitHub Actions uses UTC time, so adjust the cron schedule accordingly if you want it
    # to run at a specific local time
    
    #- cron: "0 0 * * *" # Runs every day at midnight UTC
    
    # Central America is 6 hours behind UTC (UTC-6)
    - cron: "0 6 * * *" # Runs every day at midnight in UTC-6
  workflow_dispatch: # Allows manual trigger from GitHub UI
  push:
    branches:
      - main

concurrency:
  group: update-readme
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.x"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: pnpm install

      - name: Run update script
        run: node src/index.js
        env:
          STATS_KEY: ${{ secrets.STATS_KEY }} # Your secret key for fetching stats
          #GH_TOKEN: ${{ secrets.GH_TOKEN }} # Optional: only needed for private repos

      - run: |
          git config user.name readme-bot
          git config user.email readme-bot@users.noreply.github.com
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "[bot] Update README with latest info"
          git push origin main